<app-part-organization-chart-user-box *ngIf="user && isDataModelType(user)" [user]="user" [selectedUser]="selectedUser"></app-part-organization-chart-user-box>

<div *ngIf="user && !isDataModelType(user) && isDataGroupModelType(user)" class="border p-4 flex gap-x-4 border-gray-400">
  <app-part-organization-chart-user-box *ngFor="let u of user.people" [user]="u" [selectedUser]="selectedUser"></app-part-organization-chart-user-box>
</div>
